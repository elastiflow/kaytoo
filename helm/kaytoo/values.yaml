replicaCount: 1

image:
  repository: ghcr.io/elastiflow/kaytoo
  tag: ""
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

config:
  slack:
    channelId: ""
  matrix:
    homeserver: ""
    defaultRoomId: ""
    # Optional username for password login (alternative to secrets.matrixAccessToken).
    # Pair with secrets.matrixPassword. Accepts the localpart (`kaytoo`) or full MXID (`@kaytoo:example.org`).
    user: ""
  mattermost:
    url: ""
    channelId: ""
    botUserId: ""
  opensearch:
    url: ""
    tlsInsecure: "false"
    # Default matches ElastiFlow CODEX-style indices.
    # Use elastiflow-flow-* (or your alias) if your cluster uses a different pipeline/mapping.
    # This must align with document fields that Kaytoo resolves (see README).
    indexPattern: "elastiflow-flow-codex-*"
    mcpUrl: ""
  llm:
    baseUrl: ""
    # Required. Use the exact model name your OpenAI-compatible backend exposes,
    # e.g. "gpt-4o" for OpenAI, "llama3.1" for Ollama,
    # or "unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q4_K_XL" for OpenWebUI/LiteLLM.
    model: ""

secrets:
  existingSecret: ""
  slackBotToken: ""
  slackAppToken: ""
  matrixAccessToken: ""
  # Set instead of matrixAccessToken when the homeserver only allows password login.
  matrixPassword: ""
  mattermostToken: ""
  opensearchUsername: ""
  opensearchPassword: ""
  llmApiKey: ""

logging:
  level: "info"

networkPolicy:
  enabled: false

# Optional e2e / automation: HTTP POST /chat on KAYTOO_HTTP_CHAT_BIND (console mode only in app).
httpChat:
  enabled: false
  port: 8080

