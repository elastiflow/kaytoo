{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kaytoo.fullname" . }}
  labels:
    {{- include "kaytoo.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kaytoo.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - {}
{{- end }}

