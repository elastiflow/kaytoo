# Helm values for the mermin/mermin-netobserv-os-stack (see e2e/README.md; embedded in k8s/bootstrap.yaml ConfigMap key mermin-stack-values.yaml).

mermin:
  enabled: true

netobserv-flow:
  enabled: true
  env:
    - name: EF_LICENSE_ACCEPTED
      value: "true"
    - name: EF_OUTPUT_OPENSEARCH_INDEX_TEMPLATE_REPLICAS
      value: "0"
    - name: EF_INPUT_OTLP_TRACE_SERVER_ENABLE
      value: "true"
    - name: EF_INPUT_OTLP_TRACE_SERVER_TLS_ENABLE
      value: "true"
    - name: EF_INPUT_OTLP_TRACE_SERVER_TLS_CERT_FILE
      value: "/etc/ssl/netobserv/tls.crt"
    - name: EF_INPUT_OTLP_TRACE_SERVER_TLS_KEY_FILE
      value: "/etc/ssl/netobserv/tls.key"
    - name: EF_INPUT_OTLP_HEALTH_GRPC_ADDR_PORT
      value: "4316"
  ports:
    - name: api
      protocol: TCP
      containerPort: 8080
    - name: otlp-grpc-hlth
      protocol: TCP
      containerPort: 4316
    - name: otlp-grpc
      protocol: TCP
      containerPort: 4317
    - name: netflow
      protocol: UDP
      containerPort: 9995
  service:
    ports:
      - name: otlp-grpc
        protocol: TCP
        port: 4317
        targetPort: 4317
        appProtocol: HTTP2
      - name: netflow
        protocol: UDP
        port: 9995
        targetPort: 9995
  outputOpenSearch:
    enable: true
    addresses: opensearch-cluster-master.elastiflow.svc:9200
    password: __KAYTOO_E2E_OPENSEARCH_PASSWORD__ # substituted by e2e/cli.sh up (OPENSEARCH_PASSWORD from repo .env)
    tls:
      enable: true
      skipVerification: true
    dashboards:
      provision: true
      dashboards_url: http://mermin-opensearch-dashboards.elastiflow.svc:5601
  extraVolumes:
    - name: netobserv-tls
      secret:
        secretName: netobserv-tls
  extraVolumeMounts:
    - name: netobserv-tls
      mountPath: /etc/ssl/netobserv/
  extraObjects:
    - |
      apiVersion: v1
      kind: Secret
      metadata:
        name: netobserv-tls
        labels:
          {{- include "netobserv.labels" . | nindent 4 }}
      type: kubernetes.io/tls
      data:
        tls.crt: {{ .Files.Get "tls/netobserv.crt" | b64enc }}
        tls.key: {{ .Files.Get "tls/netobserv.key" | b64enc }}
opensearch:
  enabled: true
  clusterName: elastiflow
  singleNode: true
  replicas: 1
  opensearchJavaOpts: "-Xmx1536m -Xms1536m -XX:G1HeapRegionSize=4m -XX:InitiatingHeapOccupancyPercent=40 -XX:MaxGCPauseMillis=200"
  resources:
    requests:
      cpu: "1000m"
      memory: 2048Mi
    limits:
      cpu: "1000m"
      memory: 2560Mi
  persistence:
    size: 16Gi
  extraEnvs:
    - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
      value: __KAYTOO_E2E_OPENSEARCH_PASSWORD__ # substituted by e2e/cli.sh up
opensearch-dashboards:
  enabled: true
  opensearchHosts: https://opensearch-cluster-master.elastiflow.svc:9200
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "768Mi"
  config:
    opensearch_dashboards.yml: |
      opensearch.ssl.verificationMode: none
      opensearch.requestTimeout: 60000
      opensearch.pingTimeout: 60000
      opensearch.username: admin
      opensearch.password: __KAYTOO_E2E_OPENSEARCH_PASSWORD__
